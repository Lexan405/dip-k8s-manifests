prometheus:
  prometheusSpec:
    retention: 3d
    resources:
      requests:
        memory: 300Mi
        cpu: 100m
      limits:
        memory: 600Mi
        cpu: 300m

grafana:
  adminPassword: "dip-grafana-password"
  service:
    type: ClusterIP
  resources:
    requests:
      memory: 128Mi
      cpu: 50m
    limits:
      memory: 256Mi
      cpu: 150m

alertmanager:
  alertmanagerSpec:
    resources:
      requests:
        memory: 64Mi
        cpu: 25m
      limits:
        memory: 128Mi
        cpu: 50m

nodeExporter:
  resources:
    requests:
      memory: 32Mi
      cpu: 10m
    limits:
      memory: 64Mi
      cpu: 50m

kubeStateMetrics:
  resources:
    requests:
      memory: 64Mi
      cpu: 25m
    limits:
      memory: 128Mi
      cpu: 50m
