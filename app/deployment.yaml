apiVersion: apps/v1
kind: Deployment
metadata:
  name: dip-app
  labels:
    app: dip-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: dip-app
  template:
    metadata:
      labels:
        app: dip-app
    spec:
      containers:
      - name: dip-app
        image: cr.yandex/crp02431iecrj1ocprdq/dip-app:1.0.0
        ports:
        - containerPort: 80
        resources:
          requests:
            memory: "64Mi"
            cpu: "25m"
          limits:
            memory: "128Mi"
            cpu: "100m"
