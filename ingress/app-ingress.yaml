apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: dip-app-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
  - host: app.dip.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: dip-app-service
            port:
              number: 80
